<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고양이 오목</title>
<style>
:root{
  --bg:#f3f6fb;
  --panel:#ffffff;
  --line:#6f4b2f;
  --wood1:#d9b06f;
  --wood2:#c79655;
  --accent:#ff9f43;
  --text:#233142;
  --sub:#5d6d7e;
  --shadow:0 18px 40px rgba(23,34,52,.16);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#eef4ff 0%,#f7efe7 100%);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:Malgun Gothic,Apple SD Gothic Neo,sans-serif;
  padding:18px;
}
.wrap{
  width:min(96vw,860px);
}
.topbar{
  background:rgba(255,255,255,.88);
  backdrop-filter: blur(10px);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:14px;
}
.title{
  font-size:clamp(24px,4vw,34px);
  font-weight:800;
  margin:0 0 8px;
}
.status{
  font-size:clamp(15px,2.6vw,20px);
  font-weight:700;
  color:#8a5a14;
  margin-bottom:12px;
  min-height:1.6em;
}
.controls{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
}
button{
  appearance:none;
  border:none;
  border-radius:12px;
  padding:11px 16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(1px)}
.diff{background:#dfe7ef;color:#364152}
.diff.active{background:#27ae60;color:#fff}
.restart{background:var(--accent);color:#fff}
.info-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  padding:10px 14px;
  min-width:130px;
  flex:0 0 130px;
  height:42px;
  white-space:nowrap;
  background:#fff6e9;
  color:#8a5a14;
  font-size:14px;
  font-weight:700;
}
.board-shell{
  background:var(--panel);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:16px;
  position:relative;
}
.canvas-wrap{
  width:100%;
  display:flex;
  justify-content:center;
}
canvas{
  width:min(100%,720px);
  height:auto;
  aspect-ratio:1/1;
  background:linear-gradient(180deg,var(--wood1),var(--wood2));
  border:6px solid #8b5a2b;
  border-radius:18px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 18px 35px rgba(0,0,0,.22);
  touch-action:manipulation;
}
.overlay{
  position:absolute;
  inset:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(17,24,39,.34);
  border-radius:18px;
  z-index:20;
}
.panel{
  width:min(92%,520px);
  background:rgba(255,255,255,.96);
  color:var(--text);
  border-radius:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.22);
  padding:22px;
  text-align:center;
}
.panel h2{
  margin:0 0 10px;
  font-size:26px;
}
.panel p{
  margin:0 0 16px;
  color:var(--sub);
  line-height:1.5;
}
.rps-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.rps-btn{
  min-width:110px;
  padding:16px 18px;
  background:#eef5ff;
  color:#1d3557;
  font-size:18px;
}
.small-note{
  margin-top:12px;
  font-size:13px;
  color:#6b7280;
}
.rps-arena{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:14px;
  margin:18px 0 8px;
}
.rps-hand-card{
  background:#f8fbff;
  border:1px solid #d7e6ff;
  border-radius:18px;
  padding:14px 10px 12px;
}
.rps-hand-label{
  font-size:14px;
  color:#64748b;
  margin-bottom:6px;
}
.rps-hand-emoji{
  font-size:64px;
  line-height:1;
  min-height:72px;
}
.rps-vs{
  font-weight:900;
  color:#1d3557;
  font-size:22px;
}
.rps-result{
  min-height:28px;
  margin-top:12px;
  font-size:18px;
  font-weight:800;
}
.rps-result.win{color:#0f9d58}
.rps-result.lose{color:#d93025}
.rps-result.draw{color:#2563eb}
.rps-result.pending{color:#64748b}
.rps-hand-card.win{
  box-shadow:0 0 0 3px rgba(15,157,88,.18);
  border-color:#8ad1a8;
}
.rps-hand-card.lose{
  box-shadow:0 0 0 3px rgba(217,48,37,.12);
  border-color:#f2a8a1;
}
.rps-hand-card.draw{
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
  border-color:#93c5fd;
}
@media (max-width:680px){
  body{padding:10px}
  .topbar,.board-shell{padding:12px}
  button{padding:10px 12px;font-size:14px}
  .rps-btn{min-width:94px;font-size:17px}
  .info-pill{min-width:112px;flex-basis:112px;height:40px;font-size:13px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1 class="title">고양이 오목</h1>
    <div class="status" id="status">가위바위보로 선공을 정해라냥</div>
    <div class="controls">
      <button class="diff active" data-level="easy">하</button>
      <button class="diff" data-level="normal">중</button>
      <button class="diff" data-level="hard">상</button>
      <button class="diff" data-level="god">최상</button>
      <button class="restart" id="restartBtn">재시작</button>
      <span class="info-pill" id="turnInfo">선공 결정 대기중</span>
    </div>
  </div>

  <div class="board-shell">
    <div class="canvas-wrap">
      <canvas id="board" width="720" height="720" aria-label="고양이 오목판"></canvas>
    </div>

    <div class="overlay" id="rpsOverlay">
      <div class="panel">
        <h2>가위바위보</h2>
        <p>이기는 쪽이 선공이다냥.</p>
        <div class="rps-buttons">
          <button class="rps-btn" data-rps="rock">✊ 바위</button>
          <button class="rps-btn" data-rps="paper">✋ 보</button>
          <button class="rps-btn" data-rps="scissors">✌ 가위</button>
        </div>
        <div class="rps-arena">
          <div class="rps-hand-card" id="userHandCard">
            <div class="rps-hand-label">집사</div>
            <div class="rps-hand-emoji" id="userHandEmoji">❔</div>
          </div>
          <div class="rps-vs">VS</div>
          <div class="rps-hand-card" id="aiHandCard">
            <div class="rps-hand-label">AI</div>
            <div class="rps-hand-emoji" id="aiHandEmoji">❔</div>
          </div>
        </div>
        <div class="rps-result pending" id="rpsResultText">버튼을 눌러주라냥!</div>
              </div>
    </div>
  </div>
</div>

}

function clearRPSCards(){
  [userHandCard, aiHandCard].forEach(card => card.className = "rps-hand-card");
  userHandEmoji.textContent = "❔";
  aiHandEmoji.textContent = "❔";
  rpsResultText.className = "rps-result pending";
  rpsResultText.textContent = "버튼을 눌러주라냥!";
}

function showRPSHands(user, ai, result){
  userHandEmoji.textContent = handEmoji(user);
  aiHandEmoji.textContent = handEmoji(ai);
  [userHandCard, aiHandCard].forEach(card => card.className = "rps-hand-card");
  rpsResultText.className = `rps-result ${result}`;

  if(result === "win") {
    userHandCard.classList.add("win");
    aiHandCard.classList.add("lose");
    rpsResultText.textContent = `집사 승리 · ${labelRPS(user)}가 ${labelRPS(ai)}를 이겼다냥`;
  } else if(result === "lose") {
    userHandCard.classList.add("lose");
    aiHandCard.classList.add("win");
    rpsResultText.textContent = `AI 승리 · ${labelRPS(ai)}가 ${labelRPS(user)}를 이겼다냥`;
  } else {
    userHandCard.classList.add("draw");
    aiHandCard.classList.add("draw");
    rpsResultText.textContent = `비김 · 둘 다 ${labelRPS(user)}다냥`;
  }
}

function setDifficulty(level, button){
  difficulty = level;
  document.querySelectorAll(".diff").forEach(b => b.classList.remove("active"));
  button.classList.add("active");
  resetMatch();
}

function resetMatch(){
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(EMPTY));
  gameOver = false;
  waitingForRPS = true;
  aiThinking = false;
  moveCount = 0;
  currentTurn = HUMAN;
  statusEl.innerText = renjuEnabled ? "가위바위보로 선공을 정해라냥 · 렌주룰 적용중" : "가위바위보로 선공을 정해라냥";
  turnInfoEl.innerText = "선공 결정 대기중";
  rpsOverlay.style.display = "flex";
  clearRPSCards();
  render();
}

function handleRPS(user){
  if(!waitingForRPS) return;
  const arr = ["rock","paper","scissors"];
  const ai = arr[Math.floor(Math.random() * arr.length)];

  if(user === ai){
    showRPSHands(user, ai, "draw");
    statusEl.innerText = `비겼다냥. 너: ${labelRPS(user)} / AI: ${labelRPS(ai)} 다시!`;
    return;
  }

  const playerWins = (
    (user === "rock" && ai === "scissors") ||
    (user === "paper" && ai === "rock") ||
    (user === "scissors" && ai === "paper")
  );

  showRPSHands(user, ai, playerWins ? "win" : "lose");
  playerFirst = playerWins;
  blackPlayer = playerFirst ? HUMAN : AI;
  waitingForRPS = false;
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(EMPTY));
  gameOver = false;
  aiThinking = false;
  moveCount = 0;
  currentTurn = playerFirst ? HUMAN : AI;
  statusEl.innerText = playerWins
    ? `가위바위보 승리. 너: ${labelRPS(user)} / AI: ${labelRPS(ai)} · 집사 선공`
    : `가위바위보 패배. 너: ${labelRPS(user)} / AI: ${labelRPS(ai)} · AI 선공`;
  updateTurnInfo();
  render();

  setTimeout(() => {
    rpsOverlay.style.display = "none";
    if(currentTurn === AI){
      setTimeout(aiMove, 220);
    }
  }, 3000);
}

function labelRPS(v){
  if(v === "rock") return "바위";
  if(v === "paper") return "보";
  return "가위";
}

function updateTurnInfo(){
  if(gameOver){
    turnInfoEl.innerText = "게임 종료";
    return;
  }
  if(waitingForRPS){
    turnInfoEl.innerText = "선공 결정 대기중";
    return;
  }
  if(aiThinking){
    turnInfoEl.innerText = "AI 생각중...";
    return;
  }
  turnInfoEl.innerText = currentTurn === HUMAN ? "집사 차례" : "AI 차례";
}

function drawBoard(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const woodGrad = ctx.createLinearGradient(0,0,0,canvas.height);
  woodGrad.addColorStop(0,"#ddb978");
  woodGrad.addColorStop(1,"#c99355");
  ctx.fillStyle = woodGrad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#6d4b31";
  ctx.lineWidth = 1.4;
  for(let i=1;i<=SIZE;i++){
    ctx.beginPath();
    ctx.moveTo(CELL, i*CELL);
    ctx.lineTo(SIZE*CELL, i*CELL);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(i*CELL, CELL);
    ctx.lineTo(i*CELL, SIZE*CELL);
    ctx.stroke();
  }

  const stars = [[4,4],[4,10],[10,4],[10,10],[7,7]];
  ctx.fillStyle = "rgba(79,49,18,.9)";
  for(const [r,c] of stars){
    ctx.beginPath();
    ctx.arc((c+1)*CELL, (r+1)*CELL, CELL*0.1, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawCat(x,y){
  const r = CELL/2.3;
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(cat, x-r, y-r, r*2, r*2);
  ctx.restore();
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle = "rgba(70,40,15,.25)";
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBlackStone(x,y){
  const rStone = CELL/2.3;
  const grad = ctx.createRadialGradient(
    x - rStone*0.35, y - rStone*0.35, rStone*0.15,
    x, y, rStone
  );
  grad.addColorStop(0, "#6a6a6a");
  grad.addColorStop(0.28, "#2e2e2e");
  grad.addColorStop(0.72, "#0d0d0d");
  grad.addColorStop(1, "#000000");
  ctx.beginPath();
  ctx.arc(x,y,rStone,0,Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x - rStone*0.28, y - rStone*0.32, rStone*0.28, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,255,255,0.22)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x + rStone*0.18, y + rStone*0.2, rStone*0.92, Math.PI*0.15, Math.PI*0.95);
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;
  ctx.stroke();
}

function render(){
  drawBoard();
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const x = (c+1)*CELL;
      const y = (r+1)*CELL;
      if(board[r][c] === HUMAN) drawCat(x,y);
      if(board[r][c] === AI) drawBlackStone(x,y);
    }
  }
  if(lastMove){
    const x=(lastMove.c+1)*CELL;
    const y=(lastMove.r+1)*CELL;
    ctx.beginPath();
    ctx.arc(x,y, CELL*0.12,0,Math.PI*2);
    ctx.fillStyle='red';
    ctx.fill();
  }
  updateTurnInfo();
}

function playStoneSound(){
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if(!AudioCtx) return;
  const ctxAudio = new AudioCtx();
  const osc = ctxAudio.createOscillator();
  const gain = ctxAudio.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(560, ctxAudio.currentTime);
  osc.frequency.exponentialRampToValueAtTime(240, ctxAudio.currentTime + 0.09);
  gain.gain.setValueAtTime(0.22, ctxAudio.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctxAudio.currentTime + 0.09);
  osc.connect(gain);
  gain.connect(ctxAudio.destination);
  osc.start();
  osc.stop(ctxAudio.currentTime + 0.09);
}

function handleBoardClick(e){
  if(gameOver || waitingForRPS || aiThinking || currentTurn !== HUMAN) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const c = Math.round(x / CELL) - 1;
  const r = Math.round(y / CELL) - 1;
  if(!inRange(r,c) || board[r][c] !== EMPTY) return;

  const humanForbidden = getRenjuForbiddenInfo(board, r, c, HUMAN);
  if(humanForbidden.forbidden){
    statusEl.innerText = `렌주룰 금수라 둘 수 없다냥 · ${humanForbidden.label}`;
    render();
    return;
  }

  placeStone(r,c,HUMAN);

  if(checkWin(r,c,HUMAN)){
    gameOver = true;
    statusEl.innerText = "집사 승리";
    updateTurnInfo();
    return;
  }
  if(isBoardFull()){
    gameOver = true;
    statusEl.innerText = "무승부";
    updateTurnInfo();
    return;
  }
  currentTurn = AI;
  updateTurnInfo();
  setTimeout(aiMove, 180);
}

function placeStone(r,c,player){
  board[r][c] = player;
  lastMove = {r,c};
  moveCount++;
  playStoneSound();
  render();
}

function aiMove(){
  if(gameOver || waitingForRPS || currentTurn !== AI) return;
  aiThinking = true;
  updateTurnInfo();

  setTimeout(() => {
    const move = chooseAIMove();
    if(!move){
      gameOver = true;
      statusEl.innerText = "무승부";
      aiThinking = false;
      updateTurnInfo();
      return;
    }

    const aiForbidden = getRenjuForbiddenInfo(board, move.r, move.c, AI);
    if(aiForbidden.forbidden){
      gameOver = true;
      aiThinking = false;
      statusEl.innerText = `AI가 금수를 선택해서 집사 승리 · ${aiForbidden.label}`;
      updateTurnInfo();
      return;
    }

    placeStone(move.r, move.c, AI);

    if(checkWin(move.r, move.c, AI)){
      gameOver = true;
      aiThinking = false;
      statusEl.innerText = "AI 승리";
      updateTurnInfo();
      return;
    }
    if(isBoardFull()){
      gameOver = true;
      aiThinking = false;
      statusEl.innerText = "무승부";
      updateTurnInfo();
      return;
    }

    currentTurn = HUMAN;
    aiThinking = false;
    statusEl.innerText = difficulty === "god"
      ? "최상 난이도 AI가 위협 수를 계산 완료했다냥"
      : "집사 차례";
    updateTurnInfo();
  }, difficulty === "god" ? 220 : 120);
}

function chooseAIMove(){
  const immediateWin = findWinningMoves(AI);
  if(immediateWin.length) return chooseClosestToCenter(immediateWin);

  const immediateBlock = findWinningMoves(HUMAN);
  if(immediateBlock.length) return chooseClosestToCenter(immediateBlock);

  const candidates = getCandidateMoves(board, moveCount < 2 ? 2 : 1);
  if(!candidates.length) return {r:7,c:7};

  if(difficulty === "easy") return pickByStatic(candidates, 0.70, 5, true);
  if(difficulty === "normal") return pickByStatic(candidates, 1.28, 7, false);
  if(difficulty === "hard") return pickHardMove(candidates);

  return pickGodMove(candidates);
}

function pickHardMove(candidates){
  const scored = candidates.map(m => ({
    ...m,
    total: staticMoveScore(board, m.r, m.c, AI, 2.05) + strategicBonus(board, m.r, m.c, "hard")
  })).sort((a,b)=>b.total-a.total);
  const shortlist = scored.slice(0, Math.min(8, scored.length));
  let best = shortlist[0];
  let bestValue = -Infinity;

  for(const move of shortlist){
    board[move.r][move.c] = AI;
    let value;
    if(checkWin(move.r, move.c, AI)){
      value = WIN_SCORE;
    } else if(findWinningMoves(HUMAN).length){
      value = -WIN_SCORE / 2;
    } else {
      value = minimax(1, false, -Infinity, Infinity, 6);
    }
    board[move.r][move.c] = EMPTY;
    value += move.total;
    if(value > bestValue){
      bestValue = value;
      best = move;
    }
  }
  return best;
}

function pickByStatic(candidates, defenseWeight, topN, addNoise){
  const scored = candidates.map(m => ({
    ...m,
    total: staticMoveScore(board, m.r, m.c, AI, defenseWeight) + (addNoise ? Math.random()*900 : 0)
  })).sort((a,b)=>b.total-a.total);
  const best = scored.slice(0, Math.max(1, topN));
  return best[Math.floor(Math.random()*best.length)];
}

function pickGodMove(candidates){
  const scored = candidates.map(m => ({
    ...m,
    total: staticMoveScore(board, m.r, m.c, AI, 2.65) + strategicBonus(board, m.r, m.c, "god")
  })).sort((a,b)=>b.total-a.total);

  const shortlist = scored.slice(0, Math.min(12, scored.length));
  let best = shortlist[0];
  let bestValue = -Infinity;

  for(const move of shortlist){
    board[move.r][move.c] = AI;
    const humanWins = findWinningMoves(HUMAN).length;
    let value;
    if(checkWin(move.r, move.c, AI)){
      value = WIN_SCORE;
    } else if(humanWins > 0) {
      value = -WIN_SCORE/2 - humanWins*10000;
    } else {
      value = minimax(3, false, -Infinity, Infinity, 8);
    }
    board[move.r][move.c] = EMPTY;

    value += move.total;
    if(value > bestValue){
      bestValue = value;
      best = move;
    }
  }
  return best;
}

function minimax(depth, maximizing, alpha, beta, width = 8){
  const aiWins = findWinningMoves(AI);
  if(aiWins.length) return WIN_SCORE - (2-depth)*1000;
  const humanWins = findWinningMoves(HUMAN);
  if(humanWins.length) return -WIN_SCORE + (2-depth)*1000;
  if(depth === 0 || isBoardFull()) return evaluateBoard(board);

  const candidates = getCandidateMoves(board, 1, maximizing ? AI : HUMAN).slice(0, width);
  if(candidates.length === 0) return evaluateBoard(board);

  if(maximizing){
    let value = -Infinity;
    for(const move of candidates){
      board[move.r][move.c] = AI;
      value = Math.max(value, minimax(depth-1, false, alpha, beta, width));
      board[move.r][move.c] = EMPTY;
      alpha = Math.max(alpha, value);
      if(beta <= alpha) break;
    }
    return value;
  }

  let value = Infinity;
  for(const move of candidates){
    board[move.r][move.c] = HUMAN;
    value = Math.min(value, minimax(depth-1, true, alpha, beta, width));
    board[move.r][move.c] = EMPTY;
    beta = Math.min(beta, value);
    if(beta <= alpha) break;
  }
  return value;
}

function evaluateBoard(boardRef){
  const aiPatterns = evaluatePlayer(boardRef, AI);
  const humanPatterns = evaluatePlayer(boardRef, HUMAN);
  return aiPatterns - humanPatterns * 1.22;
}

function staticMoveScore(boardRef, r, c, player, defenseWeight){
  let total = 0;
  total += evaluatePlacedMove(boardRef, r, c, player);
  total += evaluatePlacedMove(boardRef, r, c, other(player)) * defenseWeight;
  total += centerWeight(r,c);
  return total;
}

function strategicBonus(boardRef, r, c, tier){
  boardRef[r][c] = AI;
  const aiThreats = countThreatsForPlacedMove(boardRef, r, c, AI, tier);
  const aiPatterns = countThreatKinds(boardRef, r, c, AI);
  boardRef[r][c] = EMPTY;

  boardRef[r][c] = HUMAN;
  const humanThreats = countThreatsForPlacedMove(boardRef, r, c, HUMAN, tier);
  const humanPatterns = countThreatKinds(boardRef, r, c, HUMAN);
  boardRef[r][c] = EMPTY;

  let bonus = aiThreats * (tier === "god" ? 30000 : 18000) + humanThreats * (tier === "god" ? 36000 : 22000);
  if(tier !== "easy"){
    if(aiPatterns.openFours >= 1 && aiPatterns.openThrees >= 1) bonus += 240000;
    if(aiPatterns.openThrees >= 2) bonus += 120000;
    if(humanPatterns.openFours >= 1 && humanPatterns.openThrees >= 1) bonus += 260000;
    if(humanPatterns.openThrees >= 2) bonus += 140000;
  }
  if(tier === "god"){
    if(aiPatterns.closedFours >= 1 && aiPatterns.openThrees >= 1) bonus += 70000;
    if(humanPatterns.closedFours >= 1 && humanPatterns.openThrees >= 1) bonus += 85000;
    if(aiPatterns.brokenThrees >= 2) bonus += 42000;
    if(humanPatterns.brokenThrees >= 2) bonus += 50000;
  }
  return bonus;
}

function evaluatePlacedMove(boardRef, r, c, player){
  if(boardRef[r][c] !== EMPTY) return -Infinity;
  boardRef[r][c] = player;
  let score = 0;
  if(checkWinOn(boardRef, r, c, player)) score += WIN_SCORE / 4;
  score += countThreatsForPlacedMove(boardRef, r, c, player);
  score += localPatternScore(boardRef, r, c, player);
  boardRef[r][c] = EMPTY;
  return score;
}

function countThreatsForPlacedMove(boardRef, r, c, player, tier = difficulty){
  let openFours = 0;
  let closedFours = 0;
  let openThrees = 0;
  let brokenThrees = 0;

  for(const [dr,dc] of dirs){
    const line = lineString(boardRef, r, c, dr, dc, player);
    const parsed = countPatterns(line, player);
    openFours += parsed.openFours;
    closedFours += parsed.closedFours;
    openThrees += parsed.openThrees;
    brokenThrees += parsed.brokenThrees;
  }

  let score = openFours * 200000 + closedFours * 70000 + openThrees * 22000 + brokenThrees * 12000;
  if(tier === "hard") score += openFours * 30000 + openThrees * 9000;
  if(tier === "god") score += openFours * 45000 + openThrees * 14000 + brokenThrees * 7000;
  if(openFours >= 2) score += 350000;
  if(openFours >= 1 && openThrees >= 1) score += tier === "god" ? 430000 : 300000;
  if(openThrees >= 2) score += tier === "god" ? 250000 : 180000;
  if(closedFours >= 1 && brokenThrees >= 1) score += tier === "god" ? 90000 : 50000;
  return score;
}

function countThreatKinds(boardRef, r, c, player){
  let totals = {openFours:0, closedFours:0, openThrees:0, brokenThrees:0};
  for(const [dr,dc] of dirs){
    const parsed = countPatterns(lineString(boardRef, r, c, dr, dc, player), player);
    totals.openFours += parsed.openFours;
    totals.closedFours += parsed.closedFours;
    totals.openThrees += parsed.openThrees;
    totals.brokenThrees += parsed.brokenThrees;
  }
  return totals;
}

function localPatternScore(boardRef, r, c, player){
  let score = 0;
  for(const [dr,dc] of dirs){
    const left = countDirection(boardRef, r, c, -dr, -dc, player);
    const right = countDirection(boardRef, r, c, dr, dc, player);
    const total = 1 + left.count + right.count;
    const openEnds = (left.blocked ? 0 : 1) + (right.blocked ? 0 : 1);
    if(total >= 5) score += 300000;
    else if(total === 4 && openEnds === 2) score += 160000;
    else if(total === 4 && openEnds === 1) score += 50000;
    else if(total === 3 && openEnds === 2) score += 16000;
    else if(total === 3 && openEnds === 1) score += 3000;
    else if(total === 2 && openEnds === 2) score += 900;
  }
  return score;
}

function evaluatePlayer(boardRef, player){
  let score = 0;
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(boardRef[r][c] !== player) continue;
      score += centerWeight(r,c) * 0.25;
      for(const [dr,dc] of dirs){
        const prevR = r-dr, prevC = c-dc;
        if(inRange(prevR, prevC) && boardRef[prevR][prevC] === player) continue;
        const {count, openEnds} = scanRun(boardRef, r, c, dr, dc, player);
        if(count >= 5) score += 250000;
        else if(count === 4 && openEnds === 2) score += 70000;
        else if(count === 4 && openEnds === 1) score += 14000;
        else if(count === 3 && openEnds === 2) score += 6000;
        else if(count === 3 && openEnds === 1) score += 1200;
        else if(count === 2 && openEnds === 2) score += 300;
      }
    }
  }
  return score;
}

function countPatterns(line, player){
  const me = String(player);
  return {
    openFours: countOccurrences(line, `0${me}${me}${me}${me}0`),
    closedFours:
      countOccurrences(line, `0${me}${me}${me}${me}`) +
      countOccurrences(line, `${me}${me}${me}${me}0`) +
      countOccurrences(line, `${me}0${me}${me}${me}`) +
      countOccurrences(line, `${me}${me}0${me}${me}`) +
      countOccurrences(line, `${me}${me}${me}0${me}`),
    openThrees:
      countOccurrences(line, `0${me}${me}${me}0`) +
      countOccurrences(line, `0${me}0${me}${me}0`) +
      countOccurrences(line, `0${me}${me}0${me}0`),
    brokenThrees:
      countOccurrences(line, `0${me}${me}0${me}`) +
      countOccurrences(line, `${me}0${me}${me}0`) +
      countOccurrences(line, `0${me}0${me}${me}`)
  };
}

function lineString(boardRef, r, c, dr, dc, player){
  let chars = "3";
  for(let i=-4;i<=4;i++){
    const nr = r + dr*i;
    const nc = c + dc*i;
    if(!inRange(nr,nc)) chars += "3";
    else chars += String(boardRef[nr][nc]);
  }
  chars += "3";
  return chars;
}

function countOccurrences(str, pattern){
  let count = 0;
  let idx = str.indexOf(pattern);
  while(idx !== -1){
    count++;
    idx = str.indexOf(pattern, idx + 1);
  }
  return count;
}

function findWinningMoves(player){
  const out = [];
  const candidates = getCandidateMoves(board, 1, player);
  if(!candidates.length && board[7][7] === EMPTY && !getRenjuForbiddenInfo(board, 7, 7, player).forbidden) return [{r:7,c:7}];
  for(const move of candidates){
    if(getRenjuForbiddenInfo(board, move.r, move.c, player).forbidden) continue;
    board[move.r][move.c] = player;
    if(checkWinOn(board, move.r, move.c, player)) out.push(move);
    board[move.r][move.c] = EMPTY;
  }
  return out;
}

function getCandidateMoves(boardRef, radius, player = AI){
  if(moveCount === 0){
    if(getRenjuForbiddenInfo(boardRef, 7, 7, player).forbidden) return [];
    return [{r:7,c:7}];
  }
  const candidates = [];
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(boardRef[r][c] !== EMPTY) continue;
      if(!hasNeighbor(boardRef, r, c, radius)) continue;
      const forbidden = getRenjuForbiddenInfo(boardRef, r, c, player);
      if(forbidden.forbidden) continue;
      candidates.push({
        r, c,
        seed: staticMoveScore(boardRef, r, c, player, difficulty === "easy" ? 0.8 : difficulty === "normal" ? 1.2 : difficulty === "hard" ? 2.0 : 2.4)
      });
    }
  }
  candidates.sort((a,b)=>b.seed-a.seed);
  return candidates;
}

function isBlackPlayer(player){
  return player === blackPlayer;
}

function countMaxLine(boardRef, r, c, player){
  let maxLine = 1;
  for(const [dr,dc] of dirs){
    const total = 1 + countSame(boardRef, r, c, dr, dc, player) + countSame(boardRef, r, c, -dr, -dc, player);
    if(total > maxLine) maxLine = total;
  }
  return maxLine;
}

function getRenjuForbiddenInfo(boardRef, r, c, player){
  if(!renjuEnabled || !isBlackPlayer(player)) return {forbidden:false, label:""};
  if(!inRange(r,c) || boardRef[r][c] !== EMPTY) return {forbidden:true, label:"착수 불가"};

  boardRef[r][c] = player;
  const maxLine = countMaxLine(boardRef, r, c, player);
  const kinds = countThreatKinds(boardRef, r, c, player);
  boardRef[r][c] = EMPTY;

  if(maxLine > 5) return {forbidden:true, label:"장목 금수"};
  if(kinds.openFours >= 2) return {forbidden:true, label:"44 금수"};
  if(kinds.openThrees >= 2) return {forbidden:true, label:"33 금수"};
  return {forbidden:false, label:""};
}

function chooseClosestToCenter(moves){
  return moves.slice().sort((a,b)=>
    distanceToCenter(a.r,a.c) - distanceToCenter(b.r,b.c)
  )[0];
}

function centerWeight(r,c){
  return 28 - distanceToCenter(r,c);
}

function distanceToCenter(r,c){
  return Math.abs(7-r) + Math.abs(7-c);
}

function hasNeighbor(boardRef, r, c, radius){
  for(let dr=-radius; dr<=radius; dr++){
    for(let dc=-radius; dc<=radius; dc++){
      if(dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if(inRange(nr,nc) && boardRef[nr][nc] !== EMPTY) return true;
    }
  }
  return false;
}

function countDirection(boardRef, r, c, dr, dc, player){
  let count = 0;
  let nr = r + dr, nc = c + dc;
  while(inRange(nr,nc) && boardRef[nr][nc] === player){
    count++;
    nr += dr;
    nc += dc;
  }
  return {
    count,
    blocked: !inRange(nr,nc) || boardRef[nr][nc] === other(player)
  };
}

function scanRun(boardRef, r, c, dr, dc, player){
  let count = 1;
  let nr = r + dr, nc = c + dc;
  while(inRange(nr,nc) && boardRef[nr][nc] === player){
    count++;
    nr += dr;
    nc += dc;
  }
  const forwardOpen = inRange(nr,nc) && boardRef[nr][nc] === EMPTY;

  nr = r - dr; nc = c - dc;
  while(inRange(nr,nc) && boardRef[nr][nc] === player){
    count++;
    nr -= dr;
    nc -= dc;
  }
  const backOpen = inRange(nr,nc) && boardRef[nr][nc] === EMPTY;

  return {
    count,
    openEnds: (forwardOpen ? 1 : 0) + (backOpen ? 1 : 0)
  };
}

function checkWin(r,c,player){
  return checkWinOn(board, r, c, player);
}

function checkWinOn(boardRef, r, c, player){
  for(const [dr,dc] of dirs){
    let cnt = 1;
    cnt += countSame(boardRef, r, c, dr, dc, player);
    cnt += countSame(boardRef, r, c, -dr, -dc, player);
    if(cnt >= 5) return true;
  }
  return false;
}

function countSame(boardRef, r, c, dr, dc, player){
  let cnt = 0;
  let nr = r + dr, nc = c + dc;
  while(inRange(nr,nc) && boardRef[nr][nc] === player){
    cnt++;
    nr += dr;
    nc += dc;
  }
  return cnt;
}

function other(player){
  return player === HUMAN ? AI : HUMAN;
}

function inRange(r,c){
  return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
}

function isBoardFull(){
  for(let r=0;r<SIZE;r++){ for(let c=0;c<SIZE;c++){ if(board[r][c] === EMPTY) return false; } }
  return true;
}

render();
</script>
